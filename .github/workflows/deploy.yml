name: Deploy to GitHub Pages

on:
  # Se ejecuta cuando se hace push a la rama main (o master)
  push:
    branches: ["main", "master"]
  # Permite ejecutar el workflow manualmente desde la pestaña "Actions"
  workflow_dispatch:

# Otorga los permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente (cancela los pendientes si hay uno nuevo)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Trabajo de construcción (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # La carpeta donde Vite genera el build por defecto
          path: './dist'

  # Trabajo de despliegue (Deploy)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
